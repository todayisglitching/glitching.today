name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: glitching-rebuild/package-lock.json

      - name: Install and Build
        run: |
          cd glitching-rebuild
          npm ci
          npm run build

      - uses: actions/configure-pages@v5

      # КЛЮЧЕВОЙ МОМЕНТ: указываем путь к папке внутри проекта
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./glitching-rebuild/dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
