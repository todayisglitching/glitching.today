name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Добавляем права для деплоя
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      
      # Специальный шаг для загрузки артефакта Pages
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Финальный шаг деплоя
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
